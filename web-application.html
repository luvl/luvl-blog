---
layout: default
---

<div class="posts">
    {% assign web-application = site.posts | where_exp: "item" , "item.path contains 'web-application'"%}
        {% for post in web-application %}
        <article class="post">

        <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

        <div class="entry">
            {{ post.excerpt }}
        </div>

        <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
        </article>
    {% endfor %}
</div>
